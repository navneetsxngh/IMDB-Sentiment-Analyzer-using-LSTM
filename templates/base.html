<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="CineAI — AI-powered IMDB movie review sentiment analysis using Bi-LSTM deep learning"/>
    <meta name="theme-color" content="#07070f"/>
    <title>{% block title %}CineAI — Movie Sentiment Analyzer{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>"/>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

    <!-- AOS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css"/>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static', path='css/animations.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static', path='css/responsive.css') }}"/>

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Particle background canvas -->
    <canvas id="particleCanvas" aria-hidden="true"></canvas>

    <!-- Cinematic scanline -->
    <div class="scanline" aria-hidden="true"></div>

    <!-- Toast notifications -->
    <div id="toast-container" role="alert" aria-live="polite" aria-atomic="false"></div>

    <!-- Navbar -->
    {% include 'components/navbar.html' %}

    <!-- Main content -->
    <main id="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% include 'components/footer.html' %}

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <!-- Core App JS -->
    <script src="{{ url_for('static', path='js/app.js') }}"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
